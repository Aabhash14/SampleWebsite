<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <h1>Simple Website</h1>
    <nav>
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main>
    <section id="home">
      <h2>Welcome</h2>
      <p>This is a simple starter website. Edit index.html, style.css, and script.js to make it your own.</p>
      <button id="clickMe">Click me</button>
      <p id="clickOutput"></p>
    </section>

    <section id="about">
      <h2>About</h2>
      <p>Add your own content here.</p>
    </section>

    <section id="contact">
      <h2>Contact</h2>
      <p>Email: you@example.com</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Simple Website</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
